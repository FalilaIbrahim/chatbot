<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Lila's Taste House</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── PALETTE CHAUDE inspirée du logo ── */
:root{
  --or:#D4713A;      /* orange principal */
  --ord:#9E4E1F;     /* orange foncé */
  --orl:#F0956A;     /* orange clair */
  --cr:#FDF6EE;      /* crème */
  --wm:#FFF9F4;      /* blanc chaud */
  --br:#5C2E0A;      /* brun foncé */
  --mu:#B8825A;      /* brun moyen */
  --bd:#F0DDD0;      /* bordure */
  --ra:16px;

  /* Dégradé fond */
  --bg1:#FDF0E6;
  --bg2:#FAE5D3;
}

*,*::before,*::after{
  margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
}
html{height:100%;-webkit-text-size-adjust:100%;}
body{
  min-height:100%;
  font-family:'Nunito',sans-serif;
  background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 8px 24px;
  -webkit-font-smoothing:antialiased;
}

/* ── PROTECTION IMAGES ── */
img{
  -webkit-user-select:none;user-select:none;
  -webkit-user-drag:none;
  pointer-events:none; /* bloque le clic droit et le drag */
}
/* On réactive pointer-events seulement pour les photos produit via JS */

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:10px;position:relative;}
.logo-img{
  width:90px;height:90px;border-radius:50%;
  object-fit:cover;margin:0 auto 6px;display:block;
  box-shadow:0 6px 22px rgba(212,113,58,0.45);
  border:3px solid var(--or);
  pointer-events:none!important;
}
.brand{font-family:'Pacifico',cursive;font-size:1.35rem;
  background:linear-gradient(135deg,var(--or),var(--ord));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;}
.slogan{font-size:0.70rem;color:var(--mu);font-style:italic;font-weight:700;
  letter-spacing:0.5px;}

/* ── BOITE CHAT ── */
.box{
  width:100%;max-width:460px;
  background:#fff;
  border:2px solid var(--bd);
  border-radius:22px;overflow:hidden;
  box-shadow:0 12px 40px rgba(158,78,31,0.18),
             0 0 0 1px rgba(212,113,58,0.08);
}

/* ── BARRE HAUT ── */
.bar{
  background:linear-gradient(135deg, var(--or) 0%, var(--ord) 100%);
  padding:11px 14px;display:flex;align-items:center;gap:9px;
}
.av{width:36px;height:36px;background:rgba(255,255,255,0.22);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.45);}
.ai strong{display:block;color:#fff;font-size:0.85rem;font-weight:800;}
.ai small{font-size:0.67rem;color:rgba(255,255,255,0.85);}
.onl{margin-left:auto;display:flex;align-items:center;gap:4px;
  font-size:0.67rem;color:rgba(255,255,255,0.95);font-weight:700;white-space:nowrap;}
.dg{width:7px;height:7px;background:#7FE89A;border-radius:50%;
  box-shadow:0 0 6px #7FE89A;animation:bl 2s infinite;}

/* ── MESSAGES ── */
.msgs{
  height:clamp(280px,50vh,410px);
  overflow-y:auto;overflow-x:hidden;
  padding:12px 10px;
  display:flex;flex-direction:column;gap:9px;
  background:var(--wm);
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.msgs::-webkit-scrollbar{display:none;}

.msg{display:flex;flex-direction:column;max-width:88%;}
.msg.bot{align-self:flex-start;}
.msg.usr{align-self:flex-end;}
.bbl{padding:10px 13px;border-radius:var(--ra);font-size:0.83rem;line-height:1.5;word-break:break-word;}
.bot .bbl{
  background:#fff;border:1.5px solid var(--bd);
  border-bottom-left-radius:4px;color:var(--br);
  box-shadow:0 2px 8px rgba(158,78,31,0.08);
}
.usr .bbl{
  background:linear-gradient(135deg,var(--or),var(--ord));
  color:#fff;font-weight:700;border-bottom-right-radius:4px;
}
.tm{font-size:0.62rem;color:var(--mu);margin-top:3px;padding:0 3px;font-weight:600;}
.usr .tm{text-align:right;}

/* ── BOUTONS RAPIDES ── */
.qr{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.qb{
  background:linear-gradient(135deg,var(--cr),#FFF0E4);
  border:1.5px solid var(--or);color:var(--ord);
  font-family:'Nunito',sans-serif;font-size:0.73rem;font-weight:800;
  padding:6px 11px;border-radius:20px;cursor:pointer;
  -webkit-appearance:none;appearance:none;
  box-shadow:0 2px 6px rgba(212,113,58,0.15);
  transition:background 0.15s,color 0.15s;
}
.qb:active{background:linear-gradient(135deg,var(--or),var(--ord));color:#fff;}

/* ── PHOTO PRODUIT ── */
.pimg{
  width:100%;max-width:230px;height:155px;object-fit:cover;
  border-radius:12px;margin-top:8px;
  border:2px solid var(--bd);
  display:block;
  box-shadow:0 4px 14px rgba(158,78,31,0.15);
  cursor:pointer;
  /* Protection capture */
  pointer-events:auto!important;
  -webkit-user-select:none;user-select:none;
  -webkit-user-drag:none;
}
.hint{font-size:0.68rem;color:var(--mu);font-style:italic;margin-top:2px;}

/* ── PRIX ── */
.ptag{
  display:inline-block;
  background:linear-gradient(135deg,var(--or),var(--ord));
  color:#fff;font-weight:800;font-size:0.85rem;
  padding:4px 12px;border-radius:18px;margin-top:7px;
  box-shadow:0 2px 8px rgba(212,113,58,0.3);
}

/* ── QUANTITÉ ── */
.ql{font-size:0.80rem;font-weight:800;color:var(--br);margin-top:9px;}
.qs{display:flex;align-items:center;gap:12px;margin-top:6px;}
.qb2{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--or);background:#fff;color:var(--or);
  font-size:1.3rem;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;appearance:none;flex-shrink:0;line-height:1;
  box-shadow:0 2px 6px rgba(212,113,58,0.2);
}
.qb2:active{background:var(--or);color:#fff;}
.qn{font-size:1.1rem;font-weight:800;color:var(--br);min-width:26px;text-align:center;}

/* ── LIVRAISON ── */
.lv{
  background:linear-gradient(135deg,#FFF5EE,var(--cr));
  border:1.5px solid var(--bd);border-radius:10px;
  padding:7px 10px;margin-top:8px;font-size:0.79rem;color:var(--br);
  display:flex;align-items:center;gap:5px;
}

/* ── BOUTON WHATSAPP ── */
.wb{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,#25D366,#1aab54);
  color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.83rem;
  padding:10px 16px;border-radius:24px;margin-top:10px;
  border:none;cursor:pointer;width:100%;max-width:240px;
  -webkit-appearance:none;appearance:none;
  box-shadow:0 4px 14px rgba(37,211,102,0.35);
  text-decoration:none;
}
.wb:active{opacity:0.82;}
a.wb{text-decoration:none;}

/* ── CARTE ── */
.mc{background:var(--cr);border:1.5px solid var(--bd);
  border-radius:11px;overflow:hidden;margin-top:10px;max-width:240px;
  box-shadow:0 3px 10px rgba(158,78,31,0.1);}
.mf{width:100%;height:135px;border:none;display:block;}
.mi{padding:7px 10px;}
.mi strong{display:block;font-size:0.82rem;color:var(--br);}
.mi span{font-size:0.73rem;color:var(--mu);}

/* ── TYPING ── */
.typ{display:none;align-self:flex-start;background:#fff;
  border:1.5px solid var(--bd);border-radius:var(--ra);border-bottom-left-radius:4px;
  padding:10px 13px;gap:5px;flex-direction:row;align-items:center;
  box-shadow:0 2px 8px rgba(158,78,31,0.08);}
.typ.on{display:flex;}
.td{width:6px;height:6px;background:var(--or);border-radius:50%;animation:td 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s;}
.td:nth-child(3){animation-delay:.4s;}

/* ── INPUT ── */
.inpr{padding:9px 10px;border-top:2px solid var(--bd);
  display:flex;gap:7px;background:#fff;align-items:center;}
.inp{
  flex:1;background:var(--cr);
  border:1.5px solid var(--bd);border-radius:50px;
  padding:10px 14px;color:var(--br);
  font-family:'Nunito',sans-serif;font-weight:600;font-size:16px;
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color 0.2s;
}
.inp:focus{border-color:var(--or);background:#fff;}
.snd{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--or),var(--ord));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;appearance:none;
  box-shadow:0 4px 12px rgba(212,113,58,0.4);
}
.snd:active{transform:scale(0.91);}

/* ── FOOTER ── */
.ft{font-size:0.67rem;color:var(--mu);margin-top:10px;
  text-align:center;font-weight:700;line-height:1.6;}

/* ── WATERMARK sur images ── */
.img-wrap{position:relative;display:inline-block;max-width:230px;width:100%;}
.img-wrap::after{
  content:'© Lila\'s Taste House';
  position:absolute;bottom:6px;right:6px;
  background:rgba(0,0,0,0.45);color:#fff;
  font-size:0.60rem;font-weight:700;padding:2px 6px;
  border-radius:6px;pointer-events:none;
  font-family:'Nunito',sans-serif;
}

/* ── LIGHTBOX ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);
  z-index:9999;align-items:center;justify-content:center;padding:12px;
  flex-direction:column;gap:10px;}
.lb.on{display:flex;}
.lb-img-wrap{position:relative;}
.lb-img-wrap::after{
  content:'© Lila\'s Taste House — Reproduction interdite';
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.55);color:#fff;
  font-size:0.62rem;font-weight:700;padding:3px 10px;
  border-radius:8px;white-space:nowrap;
  font-family:'Nunito',sans-serif;pointer-events:none;
}
.lb img{max-width:100%;max-height:80vh;border-radius:11px;
  object-fit:contain;display:block;
  pointer-events:none!important;
  -webkit-user-select:none;user-select:none;}
.lbx{color:#fff;font-size:1.8rem;font-weight:900;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.2);border-radius:50%;cursor:pointer;
  font-family:sans-serif;}

/* ── RESPONSIVE ── */
@media(min-width:480px){
  .pimg{height:170px;max-width:250px;}
  .img-wrap{max-width:250px;}
  .msgs{height:clamp(320px,54vh,440px);}
  .bbl{font-size:0.86rem;}
}
@media(min-width:800px){
  .box{max-width:490px;}
  .msgs{height:450px;}
}
@media(max-width:340px){
  .brand{font-size:1.1rem;}
  .bbl{font-size:0.79rem;}
  .pimg{height:130px;}
  .logo-img{width:72px;height:72px;}
}

@keyframes bl{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes td{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-4px);opacity:1}}
</style>
</head>

<div class="lb" id="lb">

// Lightbox
function olb(src){
  document.getElementById('lbi').src=src;
  document.getElementById('lb').classList.add('on');
}
function clb(){document.getElementById('lb').classList.remove('on');}

// Bloc produit
function pb(nom,prix,ik){
  var id='p'+Date.now()+Math.floor(Math.random()*9999);
  setTimeout(function(){
    var el=document.getElementById(id);if(!el)return;
    var qty=1,ne=el.querySelector('.qn');
    function upd(v){qty=v;ne.textContent=qty;}
    el.querySelector('.qm').addEventListener('touchend',function(e){e.preventDefault();if(qty>1)upd(qty-1);});
    el.querySelector('.qp').addEventListener('touchend',function(e){e.preventDefault();upd(qty+1);});
    el.querySelector('.qm').addEventListener('click',function(){if(qty>1)upd(qty-1);});
    el.querySelector('.qp').addEventListener('click',function(){upd(qty+1);});
    function doOrder(){
      var tot=qty*parseInt(prix);
      var msg=encodeURIComponent(
        'Bonjour Lila ! 👋\nJe voudrais commander :\n'+
        '🛒 '+qty+' x '+nom+' — '+prix+' FCFA/unité\n'+
        '💰 Sous-total : '+tot+' FCFA\n'+
        '🛵 Livraison : 1000 FCFA\n'+
        '📦 Total : '+(tot+1000)+' FCFA\nMerci !');
      window.open('https://wa.me/22791898474?text='+msg,'_blank');
    }
    el.querySelector('.wb').addEventListener('touchend',function(e){e.preventDefault();doOrder();});
    el.querySelector('.wb').addEventListener('click',doOrder);
    var pi=el.querySelector('.pimg');
    pi.addEventListener('touchend',function(e){e.preventDefault();olb(IMGS[ik]);});
    pi.addEventListener('click',function(){olb(IMGS[ik]);});
  },200);
  return '<div id="'+id+'">'+
    '<div class="img-wrap">'+
      '<img src="'+IMGS[ik]+'" class="pimg" alt="'+nom+'"/>'+
    '</div>'+
    '<div class="hint">👆 Touchez la photo pour l\'agrandir</div>'+
    '<div class="ptag">'+prix+' FCFA / unité</div>'+
    '<div class="ql">Quantité souhaitée :</div>'+
    '<div class="qs">'+
      '<button class="qb2 qm" type="button">−</button>'+
      '<span class="qn">1</span>'+
      '<button class="qb2 qp" type="button">+</button>'+
    '</div>'+
    '<div class="lv">🛵 Livraison : <strong>+1 000 FCFA</strong></div>'+
    '<button class="wb" type="button">💬 Commander sur WhatsApp</button>'+
  '</div>';
}

function gr(txt){
  var t=txt.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for(var k in KB){if(KB[k].kw.some(function(w){return t.indexOf(w)>=0;}))return KB[k];}
  return DEF;
}
function ft(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

function am(html,side,qrs){
  qrs=qrs||[];
  var msgs=document.getElementById('msgs'),typ=document.getElementById('typ');
  var d=document.createElement('div');d.className='msg '+side;
  var b=document.createElement('div');b.className='bbl';b.innerHTML=html;
  d.appendChild(b);
  if(qrs.length&&side==='bot'){
    var qr=document.createElement('div');qr.className='qr';
    qrs.forEach(function(l){
      var btn=document.createElement('button');btn.className='qb';btn.textContent=l;
      btn.addEventListener('touchend',function(e){e.preventDefault();sq(btn);});
      btn.addEventListener('click',function(){sq(btn);});
      qr.appendChild(btn);
    });
    d.appendChild(qr);
  }
  var tm=document.createElement('div');tm.className='tm';tm.textContent=ft();
  d.appendChild(tm);
  msgs.insertBefore(d,typ);
  msgs.scrollTop=msgs.scrollHeight;
}

function doSend(){
  var inp=document.getElementById('inp');
  var txt=inp.value.trim();if(!txt)return;
  am(txt,'usr');inp.value='';
  var typ=document.getElementById('typ');typ.classList.add('on');
  document.getElementById('msgs').scrollTop=99999;
  setTimeout(function(){
    typ.classList.remove('on');
    var r=gr(txt);am(r.rep(),'bot',r.qr||[]);
  },700+Math.floor(Math.random()*350));
}

function sq(btn){
  var t=btn.textContent.replace(/\p{Emoji}/gu,'').replace(/[^\w\s'éèêëàâùûüîïôœç]/gi,'').trim();
  document.getElementById('inp').value=t;
  doSend();
}

document.getElementById('sndBtn').addEventListener('touchend',function(e){e.preventDefault();doSend();});
document.getElementById('sndBtn').addEventListener('click',doSend);
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSend();}});

document.addEventListener('keydown',function(e){

  if(e.key==='PrintScreen'){e.preventDefault();return false;}

  if((e.ctrlKey||e.metaKey)&&e.key==='p'){e.preventDefault();return false;}

  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();return false;}
});
